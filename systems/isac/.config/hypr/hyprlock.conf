general {
    hide_cursor = true
}

animations {
    enabled = false
}

background {
    monitor =
    color = rgba(0, 0, 0, 0.0)
}

image {
    path = ~/.config/hypr/hyprlock/logo.png
    size = 600
    rounding = 0
    border_color = rgba(0, 0, 0, 0.0)
    halign = center
    valign = center
    position = 0, 200
}

input-field {
    monitor =

    size = 18%, 4%

    outline_thickness = 6
    
    inner_color = rgba(0, 0, 0, 0.0)
    outer_color = rgba(ff6d0fff) 
    check_color = rgb(255, 255, 255)
    fail_color = rgba(ff0000ff)

    font_color = rgb(255, 255, 255)
    font_family = JetBrainsMono Nerd Font Mono

    fade_on_empty = false

    placeholder_text = Authenticate
    fail_text = Access Denied
    rounding = 0

    dots_text_format = *
    dots_size = 0.35
    dots_spacing = 0.5

    position = 0, -350
    halign = center
    valign = center
}
