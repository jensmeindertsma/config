monitor=,preferred,auto,1.5

exec-once = uwsm app -- swww-daemon
exec-once = uwsm app -- waybar
exec-once = uwsm app -- dunst

source = ~/.config/hypr/theme.conf

general {
    gaps_in = 5
    gaps_out = 10

    border_size = 4

    resize_on_border = true
}

group {
    drag_into_group = 2

    groupbar {
        height = 1
        indicator_height = 28
        text_offset = -17

        gaps_in = 0
        gaps_out = 0

        render_titles = true
        font_family = JetBrains Mono Nerd Font 
        font_size = 12
   }

}

decoration {
    rounding = 0

    shadow {
        enabled = false
    }
}

animations {
    enabled = no
}

dwindle {
    pseudotile = true 
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0 
    disable_hyprland_logo = true 
}

input {
    kb_layout = us

    sensitivity = 0

    follow_mouse = 1
}

cursor {
    no_warps = true
    inactive_timeout = 1
    hide_on_key_press = true

}

$mainMod = SUPER

bind = $mainMod SHIFT,	Q,	killactive,
bind = $mainMod	SHIFT,	E,	exit,

bindl = $mainMod SHIFT,	S,	exec, systemctl suspend
bindl = $mainMod SHIFT,	B,	exec, systemctl poweroff

bind = $mainMod,	RETURN,	exec, kitty
bind = $mainMod,	D,	exec, ~/.config/fuzzel/launch.sh
bind = $mainMod SHIFT,	Y,	exec, ~/.local/bin/toggle-theme
bind = $mainMod SHIFT, 	L,	exec, hyprlock

bind = $mainMod,	N,	togglesplit

bind = ALT SHIFT,	G,	togglegroup
bind = ALT,		TAB,	changegroupactive
bind = ALT,		G,	moveoutofgroup

bind = $mainMod SHIFT, P, exec, hyprshot --mode region --output-folder ~/pictures/screenshots 

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

windowrule = suppressevent maximize, class:.*
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
