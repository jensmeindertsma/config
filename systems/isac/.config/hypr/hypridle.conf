general {
    lock_cmd = pidof hyprlock || hyprlock       # Command to lock screen
    before_sleep_cmd = loginctl lock-session    # Lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on  # Optional: Turn screen on
}

listener {
    timeout = 300                                # 5 min
    on-timeout = loginctl lock-session           # Lock before idle
}
